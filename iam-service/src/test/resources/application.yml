spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379

keycloak:
  server-url: http://localhost:8080
  realm: test
  
  admin:
    client-id: admin-cli
    username: admin
    password: admin

iam:
  cache:
    enabled: false
  sync:
    enabled: false
  policy:
    default-user-role: USER

security:
  jwt:
    issuer: http://localhost:8080/realms/test

logging:
  level:
    com.enterprise.iam: DEBUG
    org.springframework.security: DEBUG
